name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
#          WARNING: uncomment the two following lines ONLY IF I want the version bump to automatic & quiet
#          skip-github-release: false
#          skip-github-pull-request: true
          target-branch: main